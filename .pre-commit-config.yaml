# .pre-commit-config.yaml — Pre-commit hooks for AI News Curation Agent
#
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Run manually:
#   pre-commit run --all-files
#
# Traces: SRC-071 (early validation — fail loudly), SRC-073 (secrets not in YAML),
#         SRC-098 (lint + test in CI/CD pipeline)

repos:
  # ── Standard pre-commit hooks ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: "^prompts/"
        # Preserve markdown hard line breaks (two trailing spaces before \n)
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude: "^prompts/"
      - id: check-yaml
        # Basic YAML syntax check (schema validation handled by local hook below)
        args: [--allow-multiple-documents]
        exclude: "^configs/.*\\.schema\\.json$"
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key
        # Additional defence against committing real private keys

  # ── Ruff — linting and formatting (SRC-098) ────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Local hooks — agent config YAML validation (SRC-071, SRC-073) ─────────
  - repo: local
    hooks:
      - id: validate-agent-configs
        name: Validate per-agent YAML configs
        language: system
        entry: python -m ai_news_agent.config.schema --validate
        files: "^configs/.*-agent\\.yaml$|^configs/default-agent\\.yaml$|^configs/example-.*\\.yaml$"
        pass_filenames: true
        # Each matched file is passed as a separate argument to the entry point.
        # The CLI validator exits 1 on any validation failure (SRC-071).

      - id: validate-scheduler-config
        name: Validate scheduler.yaml
        language: system
        entry: python -m ai_news_agent.config.schema --validate configs/scheduler.yaml --type scheduler
        files: "^configs/scheduler\\.yaml$"
        pass_filenames: false

      - id: check-no-secrets-in-configs
        name: Check YAML configs for accidentally committed secrets (SRC-073)
        language: system
        entry: |
          python -c "
          import sys
          from pathlib import Path
          from ai_news_agent.config.loader import validate_no_secrets_in_yaml, ConfigError

          errors = []
          for path in sys.argv[1:]:
              try:
                  validate_no_secrets_in_yaml(Path(path).read_text(), source_name=path)
              except ConfigError as exc:
                  errors.append(str(exc))

          if errors:
              for e in errors:
                  print(e, file=sys.stderr)
              sys.exit(1)
          "
        files: "^configs/.*\\.yaml$"
        pass_filenames: true
